palette = 'kanagawa_dragon'

[palettes.kanagawa_dragon]
# Kanagawa Dragon (Deep Dark Theme) Palette
dragon_black0 = "#0d0c10" # Extremely dark background
dragon_black1 = "#121216" # Heavy charcoal background
dragon_black3 = "#1a1a22" # Dark container gray
dragon_gray   = "#6a6a73" # Ash gray for OS/User
dragon_white  = "#c5c9c5" # Crisp bone white for text
dragon_blue   = "#658594" # Storm blue
dragon_green  = "#87a987" # Moss green
dragon_aqua   = "#6a9589" # Deep teal/aqua
dragon_orange = "#b6927b" # Muddy orange / copper
dragon_pink   = "#a292a3" # Slate pink
dragon_violet = "#897f98" # Shadow violet
dragon_red    = "#c4746e" # Muted blood red

[os]
disabled = false
style = "bg:dragon_gray fg:dragon_white"

[os.symbols]
Windows = "¾░ì▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
