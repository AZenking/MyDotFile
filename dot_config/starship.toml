truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:dragon_aqua"
format = '[[ $symbol $branch ](fg:dragon_black0 bg:dragon_green)]($style)'

[git_status]
style = "fg:dragon_white bg:dragon_aqua"
format = '[$all_status$ahead_behind]($style)'
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'

