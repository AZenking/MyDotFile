"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](dragon_gray)\
$os\
[¯é░](bg:dragon_orange fg:dragon_gray)\
$directory\
[¯é░](fg:dragon_orange bg:dragon_green)\
