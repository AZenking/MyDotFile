### 基础设置 ### =============================================
# --- 基础全局设置 top
# =============================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g mouse on               # 开启鼠标支持
set -s escape-time 0          # 解决 Vim 按 Esc 延迟
set -g focus-events on
set -g history-limit 100000   # 增加 scrollback 历史
setw -g mode-keys vi          # 开启 Vi 模式 (Prefix+[ 进入)
set -g base-index 1           # 窗口编号从 1 开始
setw -g pane-base-index 1
setw -g automatic-rename off  # 保留手动设置的 window 名称
# 在 pane 边框顶部显示
set -g pane-border-status top

# 设置边框显示内容：手动 pane 名优先，没有则显示当前命令
set -g pane-border-format "#{?pane_active,#[fg=#E6C384] 󰆍 #P #[fg=#C8C093]#{?pane_title,#{pane_title},#{pane_current_command}} ,#[fg=#54546D] 󰆍 #P #[fg=#727169]#{?pane_title,#{pane_title},#{pane_current_command}} }"

# 激活 pane 边框高亮
set -g pane-active-border-style fg="#E6C384"
set -g pane-border-style fg="#54546D"

# 更换前缀键为 Ctrl-a (更适合单手操作)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 状态栏布局：置顶，Kanagawa Wave 风格 ---
set -g status-position top
set -g status-style bg="#1F1F28",fg="#DCD7BA"
set -g status-left-style bg="#1F1F28",fg="#DCD7BA"
set -g status-right-style bg="#1F1F28",fg="#DCD7BA"
set -g status-justify left
set -g status-left-length 32
set -g status-right-length 78
set -g status-format[0] "#{E:status-left}#[align=centre]#{W:#{E:window-status-format}#{window-status-separator},#{E:window-status-current-format}#{window-status-separator}}#[align=right fill=#1F1F28]#{T:status-right}"
setw -g window-status-style bg="#1F1F28",fg="#7E9CD8"
setw -g window-status-current-style bg="#2A2A37",fg="#FFA066",bold
setw -g window-status-separator " "
setw -g window-status-format "#[bg=#1F1F28,fg=#7E9CD8]#[bg=#7E9CD8,fg=#16161D,bold]#I #[bg=#2A2A37,fg=#7E9CD8,bold] #W#[bg=#1F1F28,fg=#2A2A37]"
setw -g window-status-current-format "#[bg=#1F1F28,fg=#FFA066]#[bg=#FFA066,fg=#16161D,bold]#I #[bg=#2A2A37,fg=#FFA066,bold] #W#[bg=#1F1F28,fg=#2A2A37]"

# =============================================
# --- 快捷键优化 ---
# =============================================
# 快速重载配置
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
unbind T
bind t command-prompt -p "Pane Title: " "select-pane -T '%%'"

# 直观的分屏快捷键 (并在当前路径打开)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 调整面板大小 (Prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================
# --- 插件列表 (使用 TPM 管理) ---
# =============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'        # y 键同步到系统剪贴板
set -g @plugin 'tmux-plugins/tmux-cpu'         # CPU 和 内存监控
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'omerxx/tmux-sessionx'          # Prefix+o 模糊搜索会话
set -g @plugin 'omerxx/tmux-floax'             # Prefix+p 悬浮终端
set -g @plugin 'christoomey/vim-tmux-navigator' # Ctrl+hjkl 顺滑切换 Nvim/Tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'alexwforsythe/tmux-which-key'
# =============================================
# --- 插件自定义配置 ---
# =============================================
# 悬浮窗与图片支持
set -g @floax-bind 'p'
set -g @sessionx-bind 'o'
set -g @sessionx-tree-mode 'on'
set -g @sessionx-window-mode 'on'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-window-height '90%'
set -g @sessionx-window-width '75%'
set -g allow-passthrough on   # 允许图片显示

# 用 sessionx 替代 tmux 原生 choose-tree
bind w run-shell /Users/charles/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh

# --- Kanagawa 状态栏内容 ---
set -g status-left "#{?client_prefix,#[bg=#1F1F28]#[fg=#C34043]#[bg=#C34043]#[fg=#16161D]#[bold]󰌌#[nobold]#[bg=#1F1F28]#[fg=#C34043] ,}#[bg=#1F1F28]#[fg=#6A9589]#[bg=#6A9589]#[fg=#16161D]#[bold]#S#[nobold]#[bg=#1F1F28]#[fg=#6A9589] "
set -g status-right "#[fg=#54546D]│ #[fg=#76946A] #(/Users/charles/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#7AA89F] #(/Users/charles/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) #[fg=#DCA561]󰁹 #(/Users/charles/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh) #[fg=#54546D]│ #[fg=#E6C384]󰥔 %m-%d %H:%M "

# 初始化 TPM (务必放在最后)
run '~/.tmux/plugins/tpm/tpm'

# TPM 加载后再次覆盖状态栏布局，避免插件改写后右侧模块不靠右
set -g status-right "#[fg=#54546D]│ #[fg=#76946A] #(/Users/charles/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#7AA89F] #(/Users/charles/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) #[fg=#DCA561]󰁹 #(/Users/charles/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh) #[fg=#54546D]│ #[fg=#E6C384]󰥔 %m-%d %H:%M "
set -g status-format[0] "#{E:status-left}#[align=centre]#{W:#{E:window-status-format}#{window-status-separator},#{E:window-status-current-format}#{window-status-separator}}#[align=right fill=#1F1F28]#{T:status-right}"
